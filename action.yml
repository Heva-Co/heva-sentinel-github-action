name: "Heva Code Sentinel"
description: "AI-powered code review with Claude that posts findings to Google Chat"
author: "Heva"

inputs:
  anthropic-api-key:
    description: "Anthropic API key for Claude"
    required: true
  google-chat-webhook:
    description: "Google Chat webhook URL for posting reviews"
    required: true
  python-version:
    description: "Python version to use"
    required: false
    default: "3.11"
  claude-model:
    description: "Claude model to use for reviews"
    required: false
    default: "claude-sonnet-4-6"
  diff-max-chars:
    description: "Max characters of diff to send to Claude"
    required: false
    default: "12000"
  repo-type:
    description: "Type of project (e.g. 'Go backend', 'React/Next.js app')"
    required: true
  repo-stack:
    description: "Tech stack (e.g. 'Go, PostgreSQL, Gin, GCP')"
    required: true
  review-focus:
    description: "What the reviewer should focus on (e.g. 'API contracts, DB transactions, error handling')"
    required: true
  thread-key:
    description: "Google Chat thread key for grouping messages (daily + capped at 10 replies)"
    required: false
    default: ""
  jira-client-id:
    description: "Jira OAuth 2.0 service account client ID"
    required: false
    default: ""
  jira-client-secret:
    description: "Jira OAuth 2.0 service account client secret"
    required: false
    default: ""
  jira-cloud-id:
    description: "Jira cloud ID (UUID from your Atlassian site)"
    required: false
    default: ""
  jira-project-key:
    description: "Jira project key to search for bugs (e.g. TT)"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Sentinel sunsetted
      shell: bash
      run: echo "Heva Code Sentinel has been sunsetted. This action is a no-op."
