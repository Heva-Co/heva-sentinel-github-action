name: "Heva Code Sentinel"
description: "AI-powered code review with Claude that posts findings to Google Chat"
author: "Heva"

inputs:
  anthropic-api-key:
    description: "Anthropic API key for Claude"
    required: true
  google-chat-webhook:
    description: "Google Chat webhook URL for posting reviews"
    required: true
  python-version:
    description: "Python version to use"
    required: false
    default: "3.11"
  claude-model:
    description: "Claude model to use for reviews"
    required: false
    default: "claude-sonnet-4-6"
  diff-max-chars:
    description: "Max characters of diff to send to Claude"
    required: false
    default: "12000"
  repo-type:
    description: "Type of project (e.g. 'Go backend', 'React/Next.js app')"
    required: true
  repo-stack:
    description: "Tech stack (e.g. 'Go, PostgreSQL, Gin, GCP')"
    required: true
  review-focus:
    description: "What the reviewer should focus on (e.g. 'API contracts, DB transactions, error handling')"
    required: true
  thread-key:
    description: "Google Chat thread key for grouping messages (daily + capped at 10 replies)"
    required: false
    default: ""
  jira-api-token:
    description: "Jira API token for posting comments on matched tickets"
    required: false
    default: ""
  jira-email:
    description: "Jira account email for API auth"
    required: false
    default: ""
  jira-base-url:
    description: "Jira base URL (e.g. https://heva-co.atlassian.net)"
    required: false
    default: ""
  jira-project-key:
    description: "Jira project key to search for bugs (e.g. TT)"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install dependencies
      shell: bash
      run: pip install -r ${{ github.action_path }}/requirements.txt -q

    - name: Run Sentinel Review
      shell: bash
      env:
        ANTHROPIC_API_KEY: ${{ inputs.anthropic-api-key }}
        GOOGLE_CHAT_WEBHOOK: ${{ inputs.google-chat-webhook }}
        CLAUDE_MODEL: ${{ inputs.claude-model }}
        DIFF_MAX_CHARS: ${{ inputs.diff-max-chars }}
        REPO_NAME: ${{ github.repository }}
        REPO_SHORT: ${{ github.event.repository.name }}
        COMMIT_SHA: ${{ github.sha }}
        COMMIT_MSG: ${{ github.event.head_commit.message || github.event.commits[0].message || 'No message' }}
        AUTHOR: ${{ github.event.head_commit.author.name || github.event.commits[0].author.name || github.actor }}
        BRANCH: ${{ github.ref_name }}
        COMMIT_URL: https://github.com/${{ github.repository }}/commit/${{ github.sha }}
        REPO_TYPE: ${{ inputs.repo-type }}
        REPO_STACK: ${{ inputs.repo-stack }}
        REVIEW_FOCUS: ${{ inputs.review-focus }}
        THREAD_KEY: ${{ inputs.thread-key }}
        JIRA_API_TOKEN: ${{ inputs.jira-api-token }}
        JIRA_EMAIL: ${{ inputs.jira-email }}
        JIRA_BASE_URL: ${{ inputs.jira-base-url }}
        JIRA_PROJECT_KEY: ${{ inputs.jira-project-key }}
      run: python3 ${{ github.action_path }}/sentinel_review.py
